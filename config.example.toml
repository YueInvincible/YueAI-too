[core]
data_dir = "data"
log_level = "INFO"
tool_timeout_seconds = 30.0

[permissions]
profile = "observe"
interactive_approval = false

[plugins]
roots = ["plugins"]
enabled = ["openai.compat", "llama.cpp"]

[plugins.options."openai.compat"]
providers = [
  { provider_name = "openai.coder", backend = "openai", model = "gpt-4.1-mini", api_key_env = "OPENAI_API_KEY", timeout_seconds = 120.0, temperature = 0.2, max_tokens = 2048 },
  { provider_name = "ollama.chat", backend = "ollama", base_url = "http://127.0.0.1:11434/v1", model = "qwen2.5:7b-instruct", timeout_seconds = 120.0, temperature = 0.6, max_tokens = 1024 },
  { provider_name = "lmstudio.chat", backend = "lmstudio", base_url = "http://127.0.0.1:1234/v1", model = "openai/gpt-oss-20b", timeout_seconds = 120.0, temperature = 0.4, max_tokens = 1536 },
]

[plugins.options."llama.cpp"]
base_url = "http://127.0.0.1:8080"
model = "Qwen2.5-Coder-7B-Instruct-GGUF"
provider_name = "llama.coder"
timeout_seconds = 120.0
temperature = 0.2
max_tokens = 2048

[conversation]
default_provider = "ollama.chat"
store_backend = "sqlite"
sqlite_path = "data/conversations.db"
max_tool_iterations = 4
max_tool_output_chars = 12000

[conversation.routes.chat]
provider = "ollama.chat"
prompt_profile = "default"

[conversation.routes.coding_agent]
provider = "openai.coder"
prompt_profile = "coding_agent"

[conversation.prompt_profiles.default]
personality = "Local-first assistant. Short, clear, and practical."
system_instruction = "Prefer the configured local provider for normal chat unless the caller overrides it."
tool_instruction = "Only call tools when they materially improve the answer or are explicitly requested."
response_instruction = "Keep answers concise and preserve Vietnamese when the user writes Vietnamese."

[conversation.prompt_profiles.coding_agent]
personality = "Senior coding agent. Direct, technical, and execution-focused."
system_instruction = "You are responsible for implementing code changes safely and validating them with real commands or tests."
tool_instruction = "Use available tools to inspect the repo, run tests, and verify changes before considering work complete."
response_instruction = "State assumptions, verification, and remaining risks clearly."

[desktop]
hotkey = "Ctrl+Shift+Y"
window_anchor = "bottom-right"
model_path = ""
click_opens_console = true
